<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <link rel="stylesheet" href="lib/xterm/xterm.css">
    <link rel="stylesheet" href="terminal.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div id="loading-title" class="loading-title">Starting Terminal...</div>
            <div id="loading-shortcuts" class="loading-shortcuts">
                <table>
                    <tr><td class="key">Ctrl+Shift+C</td><td>Copy selection</td></tr>
                    <tr><td class="key">Ctrl+Shift+V</td><td>Paste</td></tr>
                    <tr><td class="key">exit</td><td>Close terminal</td></tr>
                </table>
            </div>
        </div>
    </div>
    <div id="tab-bar">
        <div id="tabs"></div>
        <button id="add-tab-btn" title="New Terminal">+</button>
    </div>
    <div id="terminal-container"></div>
    <div id="debug" style="position:fixed;bottom:0;left:0;right:0;background:#300;color:#f88;font-family:monospace;font-size:11px;padding:4px 8px;z-index:9999;max-height:120px;overflow:auto;display:none;"></div>

    <script src="lib/xterm/xterm.js"></script>
    <script src="lib/xterm/addon-fit.js"></script>
    <script>
    (function () {
        'use strict';

        var DEBUG = false;
        var debugEl = document.getElementById('debug');
        if (DEBUG) debugEl.style.display = 'block';
        function dbg(msg) {
            if (!DEBUG) return;
            debugEl.textContent += msg + '\n';
            debugEl.scrollTop = debugEl.scrollHeight;
        }

        // ---------------------
        // State
        // ---------------------
        var htmlComp = null; // reference to MATLAB htmlComponent
        var config = null;
        var tabs = {};
        var activeTabId = null;
        var tabCounter = 0;
        var pendingTabs = [];

        var tabsEl = document.getElementById('tabs');
        var addTabBtn = document.getElementById('add-tab-btn');
        var containerEl = document.getElementById('terminal-container');

        // ---------------------
        // Communication with MATLAB
        // ---------------------
        var useEvents = false;  // true if R2023a+ event API is available

        // --- Legacy Data channel (pre-R2023a) ---
        var inputBuffer = {};   // id -> accumulated keystrokes
        var inputFlushTimer = null;
        var msgQueue = [];      // outbound message queue to MATLAB
        var sendTimer = null;

        function sendToMATLAB(msg) {
            if (useEvents) {
                // R2023a+: send named event directly — no buffering needed.
                htmlComp.sendEventToMATLAB(msg.type, msg);
                return;
            }
            // Legacy: queue and space out to avoid Data overwrites.
            msgQueue.push(msg);
            drainQueue();
        }

        function drainQueue() {
            if (sendTimer || msgQueue.length === 0 || !htmlComp) return;
            htmlComp.Data = msgQueue.shift();
            if (msgQueue.length > 0) {
                sendTimer = setTimeout(function () {
                    sendTimer = null;
                    drainQueue();
                }, 50);
            }
        }

        function bufferInput(id, data) {
            if (useEvents) {
                // R2023a+: send immediately — events are queued, not overwritten.
                sendToMATLAB({ type: 'input', id: id, data: data });
                return;
            }
            // Legacy: buffer keystrokes to reduce Data writes.
            if (!inputBuffer[id]) {
                inputBuffer[id] = '';
            }
            inputBuffer[id] += data;

            if (!inputFlushTimer) {
                inputFlushTimer = setTimeout(flushInput, 80);
            }
        }

        function flushInput() {
            inputFlushTimer = null;
            var ids = Object.keys(inputBuffer);
            for (var i = 0; i < ids.length; i++) {
                var id = ids[i];
                if (inputBuffer[id]) {
                    sendToMATLAB({ type: 'input', id: id, data: inputBuffer[id] });
                    inputBuffer[id] = '';
                }
            }
        }

        function handleMATLABMessage(data) {
            if (!data || typeof data !== 'object' || !data.type) return;

            dbg('From MATLAB: ' + data.type);

            switch (data.type) {
                case 'init':
                    initialize(data.theme);
                    break;
                case 'created':
                    finalizeTab(data.id);
                    break;
                case 'output':
                    writeOutput(data.id, data.data);
                    break;
                case 'exited':
                    markTabExited(data.id, data.exitCode);
                    break;
                case 'theme':
                    // Live theme update (user switched MATLAB theme).
                    dbg('THEME UPDATE received: isDark=' + (data.theme && data.theme.isDark));
                    var newTheme = data.theme;
                    config = { theme: newTheme };
                    applyTheme(newTheme);
                    var xtTheme = buildXtermTheme(newTheme);
                    var ids = Object.keys(tabs);
                    for (var t = 0; t < ids.length; t++) {
                        var entry = tabs[ids[t]];
                        if (entry.terminal) {
                            entry.terminal.options.theme = xtTheme;
                            entry.terminal.options.fontFamily = newTheme.fontFamily || 'Consolas, monospace';
                            entry.terminal.options.fontSize = newTheme.fontSize || 14;
                            if (entry.fitAddon) entry.fitAddon.fit();
                        }
                    }
                    break;
                case 'restarting':
                    // Server died — show overlay and prepare for fresh init.
                    var overlay = document.getElementById('loading-overlay');
                    if (overlay) {
                        document.getElementById('loading-title').textContent = 'Restarting Terminal...';
                        document.getElementById('loading-shortcuts').style.display = 'none';
                        overlay.classList.remove('hidden');
                    }
                    // Dispose all existing tabs — PTY sessions are gone.
                    for (var rid in tabs) {
                        if (tabs[rid].terminal) tabs[rid].terminal.dispose();
                        if (tabs[rid].tab) tabs[rid].tab.remove();
                        if (tabs[rid].wrapper) tabs[rid].wrapper.remove();
                    }
                    tabs = {};
                    activeTabId = null;
                    pendingTabs = [];
                    initialized = false;
                    break;
                case 'batch':
                    // Process a batch of messages from MATLAB polling.
                    var msgs = data.messages;
                    if (!msgs) {
                        dbg('batch: no messages field');
                        break;
                    }
                    // MATLAB may send a struct array or a single struct.
                    if (!Array.isArray(msgs)) {
                        msgs = [msgs];
                    }
                    dbg('batch: ' + msgs.length + ' msgs');
                    for (var i = 0; i < msgs.length; i++) {
                        var m = msgs[i];
                        dbg('  msg[' + i + '] type=' + m.type + ' id=' + m.id + ' hasData=' + (!!m.data));
                        if (m.type === 'output') {
                            writeOutput(m.id, m.data);
                        } else if (m.type === 'exited') {
                            markTabExited(m.id, m.exitCode);
                        }
                    }
                    break;
            }
        }

        // ---------------------
        // MATLAB uihtml setup (called by framework)
        // ---------------------
        var initialized = false;

        function initialize(theme) {
            if (initialized) return;
            initialized = true;
            config = { theme: theme };
            applyTheme(theme);

            var existingIds = theme.existingSessionIds;
            var scrollbacks = theme.scrollbacks || {};
            if (existingIds && existingIds.length > 0) {
                dbg('Reconnecting to ' + existingIds.length + ' existing session(s)');
                for (var i = 0; i < existingIds.length; i++) {
                    reconnectTab(existingIds[i], scrollbacks[existingIds[i]]);
                }
            } else {
                dbg('Initializing with new tab');
                createTab();
            }
        }

        // Named event handlers so we can remove them on re-entry.
        function onInit(event) { handleMATLABMessage({ type: 'init', theme: event.Data }); }
        function onCreated(event) { handleMATLABMessage(event.Data); }
        function onBatch(event) { handleMATLABMessage(event.Data); }
        function onTheme(event) { handleMATLABMessage(event.Data); }
        function onRestarting(event) { handleMATLABMessage({ type: 'restarting' }); }
        function onDataChanged(event) { handleMATLABMessage(event.Data); }

        window.setup = function (component) {
            dbg('setup() called by MATLAB');

            // Clean up previous state on reload (undock/redock).
            // Without this, each reload cycle adds duplicate event
            // listeners and leaks orphaned xterm.js Terminal instances,
            // causing progressive slowdown.

            // 1. Remove event listeners from previous component.
            if (htmlComp) {
                htmlComp.removeEventListener('init', onInit);
                htmlComp.removeEventListener('created', onCreated);
                htmlComp.removeEventListener('batch', onBatch);
                htmlComp.removeEventListener('theme', onTheme);
                htmlComp.removeEventListener('restarting', onRestarting);
                htmlComp.removeEventListener('DataChanged', onDataChanged);
            }

            // 2. Dispose xterm.js instances and remove DOM elements.
            for (var id in tabs) {
                if (tabs[id].terminal) {
                    tabs[id].terminal.dispose();
                }
                if (tabs[id].tab) {
                    tabs[id].tab.remove();
                }
                if (tabs[id].wrapper) {
                    tabs[id].wrapper.remove();
                }
            }
            tabs = {};
            activeTabId = null;

            htmlComp = component;
            initialized = false;

            // Detect R2023a+ event API.
            useEvents = typeof component.sendEventToMATLAB === 'function';
            dbg('useEvents=' + useEvents);

            if (useEvents) {
                // R2023a+: listen for named events from MATLAB.
                component.addEventListener('init', onInit);
                component.addEventListener('created', onCreated);
                component.addEventListener('batch', onBatch);
                component.addEventListener('theme', onTheme);
                component.addEventListener('restarting', onRestarting);
            } else {
                // Legacy: listen for Data channel changes.
                component.addEventListener('DataChanged', onDataChanged);
            }

            // Tell MATLAB we're ready — triggers (re-)init.
            sendToMATLAB({ type: 'ready' });
        };

        // ---------------------
        // Theme
        // ---------------------
        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function adjustBrightness(rgb, amount) {
            var r = Math.max(0, Math.min(255, rgb.r + amount));
            var g = Math.max(0, Math.min(255, rgb.g + amount));
            var b = Math.max(0, Math.min(255, rgb.b + amount));
            return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function applyTheme(theme) {
            if (!theme) return;
            var root = document.documentElement;
            if (!theme.isDark) {
                root.classList.add('light');
            } else {
                root.classList.remove('light');
            }
            if (theme.background) root.style.setProperty('--bg-color', theme.background);
            if (theme.foreground) root.style.setProperty('--fg-color', theme.foreground);
            if (theme.fontFamily) root.style.setProperty('--font-family', theme.fontFamily);
            if (theme.fontSize) root.style.setProperty('--font-size', theme.fontSize + 'px');

            // Derive tab bar and scrollbar colors from the theme background.
            if (theme.background) {
                var rgb = hexToRgb(theme.background);
                if (rgb) {
                    if (theme.isDark) {
                        root.style.setProperty('--tab-bg', adjustBrightness(rgb, 18));
                        root.style.setProperty('--tab-bg-active', theme.background);
                        root.style.setProperty('--tab-border', adjustBrightness(rgb, 30));
                        root.style.setProperty('--tab-fg', adjustBrightness(rgb, 120));
                        root.style.setProperty('--tab-fg-active', '#ffffff');
                        root.style.setProperty('--tab-hover-bg', adjustBrightness(rgb, 24));
                        root.style.setProperty('--scrollbar-thumb', adjustBrightness(rgb, 40));
                    } else {
                        root.style.setProperty('--tab-bg', adjustBrightness(rgb, -8));
                        root.style.setProperty('--tab-bg-active', theme.background);
                        root.style.setProperty('--tab-border', adjustBrightness(rgb, -18));
                        root.style.setProperty('--tab-fg', adjustBrightness(rgb, -100));
                        root.style.setProperty('--tab-fg-active', '#1e1e1e');
                        root.style.setProperty('--tab-hover-bg', adjustBrightness(rgb, -12));
                        root.style.setProperty('--scrollbar-thumb', adjustBrightness(rgb, -30));
                    }
                }
            }
        }

        function buildXtermTheme(theme) {
            if (!theme) return {};
            var xt = {
                background: theme.background || '#1e1e1e',
                foreground: theme.foreground || '#d4d4d4',
                cursor: theme.cursor || '#ffffff',
                cursorAccent: theme.cursorAccent || theme.background || '#1e1e1e',
                selectionBackground: theme.selectionBackground || '#264f78'
            };
            var ansiKeys = [
                'black', 'red', 'green', 'yellow', 'blue', 'magenta', 'cyan', 'white',
                'brightBlack', 'brightRed', 'brightGreen', 'brightYellow',
                'brightBlue', 'brightMagenta', 'brightCyan', 'brightWhite'
            ];
            for (var i = 0; i < ansiKeys.length; i++) {
                if (theme[ansiKeys[i]]) {
                    xt[ansiKeys[i]] = theme[ansiKeys[i]];
                }
            }
            return xt;
        }

        // ---------------------
        // Output handling
        // ---------------------
        function writeOutput(id, base64Data) {
            var entry = tabs[id];
            if (!entry) return;
            try {
                var raw = atob(base64Data);
            } catch (e) {
                dbg('Failed to decode base64 for ' + id + ': ' + e.message);
                return;
            }
            var bytes = new Uint8Array(raw.length);
            for (var i = 0; i < raw.length; i++) {
                bytes[i] = raw.charCodeAt(i);
            }
            entry.terminal.write(bytes);
        }

        function markTabExited(id, exitCode) {
            var entry = tabs[id];
            if (!entry) return;
            entry.exited = true;
            // Auto-close the tab immediately.
            closeTab(id);
        }

        // ---------------------
        // Tab Management
        // ---------------------
        function createTab() {
            tabCounter++;
            var tempName = 'Terminal ' + tabCounter;

            var tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.innerHTML =
                '<span class="tab-label">' + tempName + '</span>' +
                '<button class="tab-close" title="Close">&times;</button>';

            var wrapper = document.createElement('div');
            wrapper.className = 'terminal-wrapper';
            containerEl.appendChild(wrapper);

            var theme = config && config.theme;
            var terminal = new Terminal({
                fontFamily: (theme && theme.fontFamily) || 'Consolas, monospace',
                fontSize: (theme && theme.fontSize) || 14,
                theme: buildXtermTheme(theme),
                cursorBlink: true,
                allowProposedApi: true
            });

            var fitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(fitAddon);
            terminal.open(wrapper);

            pendingTabs.push({
                terminal: terminal,
                fitAddon: fitAddon,
                wrapper: wrapper,
                tab: tabEl,
                exited: false
            });

            tabsEl.appendChild(tabEl);

            // Tell MATLAB to create a session on the server.
            sendToMATLAB({ type: 'create' });

            switchToWrapper(wrapper, tabEl);

            setTimeout(function () {
                fitAddon.fit();
            }, 50);
        }

        function finalizeTab(id) {
            if (pendingTabs.length === 0) {
                dbg('Received "created" but no pending tab');
                return;
            }

            var entry = pendingTabs.shift();
            tabs[id] = entry;

            // Hide loading overlay once first tab is ready.
            var overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('hidden');
            entry.tab.dataset.tabId = id;
            activeTabId = id;

            entry.tab.addEventListener('click', function (e) {
                if (e.target.classList.contains('tab-close')) return;
                switchTab(id);
            });

            entry.tab.querySelector('.tab-close').addEventListener('click', function (e) {
                e.stopPropagation();
                closeTab(id);
            });

            // Keystrokes -> buffer -> MATLAB -> server
            entry.terminal.onData(function (data) {
                if (!entry.exited) {
                    bufferInput(id, data);
                }
            });

            // Resize -> MATLAB -> server
            entry.terminal.onResize(function (size) {
                sendToMATLAB({ type: 'resize', id: id, cols: size.cols, rows: size.rows });
            });

            // Copy/Paste: Ctrl+Shift+C / Ctrl+Shift+V
            if (navigator.clipboard) {
                entry.terminal.attachCustomKeyEventHandler(function (e) {
                    if (e.ctrlKey && e.shiftKey && e.type === 'keydown') {
                        if (e.key === 'C') {
                            try {
                                var sel = entry.terminal.getSelection();
                                if (sel) navigator.clipboard.writeText(sel);
                            } catch (err) {}
                            return false;
                        }
                        if (e.key === 'V') {
                            try {
                                navigator.clipboard.readText().then(function (text) {
                                    if (text && !entry.exited) bufferInput(id, text);
                                });
                            } catch (err) {}
                            return false;
                        }
                    }
                    return true;
                });
            }

            // Force layout reflow then fit — fixes xterm.js not rendering
            // keystrokes when no other element triggers a reflow.
            void entry.wrapper.offsetHeight;
            entry.fitAddon.fit();

            // Send initial size.
            var dims = entry.fitAddon.proposeDimensions();
            if (dims) {
                sendToMATLAB({ type: 'resize', id: id, cols: dims.cols, rows: dims.rows });
            }

            entry.terminal.focus();

            // Additional delayed fit calls to catch late layout changes.
            // Also re-send resize in case container size changed since initial send.
            function delayedFitAndResize() {
                entry.fitAddon.fit();
                entry.terminal.refresh(0, entry.terminal.rows - 1);
                var d = entry.fitAddon.proposeDimensions();
                if (d && d.cols > 0 && d.rows > 0) {
                    sendToMATLAB({ type: 'resize', id: id, cols: d.cols, rows: d.rows });
                }
            }
            setTimeout(function () {
                delayedFitAndResize();
                entry.terminal.focus();
            }, 100);
            setTimeout(delayedFitAndResize, 500);
            setTimeout(delayedFitAndResize, 1500);
        }

        function reconnectTab(id, scrollbackBase64) {
            // Re-create the UI for an existing server session after a page reload.
            tabCounter++;
            var tabName = 'Terminal ' + tabCounter;

            var tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.innerHTML =
                '<span class="tab-label">' + tabName + '</span>' +
                '<button class="tab-close" title="Close">&times;</button>';

            var wrapper = document.createElement('div');
            wrapper.className = 'terminal-wrapper';
            containerEl.appendChild(wrapper);

            var theme = config && config.theme;
            var terminal = new Terminal({
                fontFamily: (theme && theme.fontFamily) || 'Consolas, monospace',
                fontSize: (theme && theme.fontSize) || 14,
                theme: buildXtermTheme(theme),
                cursorBlink: true,
                allowProposedApi: true
            });

            var fitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(fitAddon);
            terminal.open(wrapper);

            // Replay scrollback to restore previous output.
            if (scrollbackBase64) {
                dbg('Replaying scrollback for ' + id + ' (' + scrollbackBase64.length + ' base64 chars)');
                try {
                    var raw = atob(scrollbackBase64);
                    var bytes = new Uint8Array(raw.length);
                    for (var j = 0; j < raw.length; j++) {
                        bytes[j] = raw.charCodeAt(j);
                    }
                    terminal.write(bytes);
                } catch (e) {
                    dbg('Failed to decode scrollback for ' + id + ': ' + e.message);
                }
            }

            tabsEl.appendChild(tabEl);

            // Directly finalize with the known session ID (no server create needed).
            var entry = {
                terminal: terminal,
                fitAddon: fitAddon,
                wrapper: wrapper,
                tab: tabEl,
                exited: false
            };
            tabs[id] = entry;

            // Hide loading overlay.
            var overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('hidden');
            tabEl.dataset.tabId = id;
            activeTabId = id;

            tabEl.addEventListener('click', function (e) {
                if (e.target.classList.contains('tab-close')) return;
                switchTab(id);
            });

            tabEl.querySelector('.tab-close').addEventListener('click', function (e) {
                e.stopPropagation();
                closeTab(id);
            });

            terminal.onData(function (data) {
                if (!entry.exited) {
                    bufferInput(id, data);
                }
            });

            terminal.onResize(function (size) {
                sendToMATLAB({ type: 'resize', id: id, cols: size.cols, rows: size.rows });
            });

            if (navigator.clipboard) {
                terminal.attachCustomKeyEventHandler(function (e) {
                    if (e.ctrlKey && e.shiftKey && e.type === 'keydown') {
                        if (e.key === 'C') {
                            try {
                                var sel = terminal.getSelection();
                                if (sel) navigator.clipboard.writeText(sel);
                            } catch (err) {}
                            return false;
                        }
                        if (e.key === 'V') {
                            try {
                                navigator.clipboard.readText().then(function (text) {
                                    if (text && !entry.exited) bufferInput(id, text);
                                });
                            } catch (err) {}
                            return false;
                        }
                    }
                    return true;
                });
            }

            switchToWrapper(wrapper, tabEl);

            void wrapper.offsetHeight;
            fitAddon.fit();

            var dims = fitAddon.proposeDimensions();
            if (dims) {
                sendToMATLAB({ type: 'resize', id: id, cols: dims.cols, rows: dims.rows });
            }

            terminal.focus();

            setTimeout(function () {
                fitAddon.fit();
                terminal.refresh(0, terminal.rows - 1);
                terminal.focus();
                var d = fitAddon.proposeDimensions();
                if (d && d.cols > 0 && d.rows > 0) {
                    sendToMATLAB({ type: 'resize', id: id, cols: d.cols, rows: d.rows });
                }
            }, 100);
            setTimeout(function () {
                fitAddon.fit();
                terminal.refresh(0, terminal.rows - 1);
            }, 500);
        }

        function closeTab(id) {
            var entry = tabs[id];
            if (!entry) return;

            if (!entry.exited) {
                sendToMATLAB({ type: 'close', id: id });
            }

            entry.terminal.dispose();
            entry.tab.remove();
            entry.wrapper.remove();
            delete tabs[id];

            if (activeTabId === id) {
                var remaining = Object.keys(tabs);
                if (remaining.length > 0) {
                    switchTab(remaining[remaining.length - 1]);
                } else {
                    activeTabId = null;
                }
            }
        }

        function switchTab(id) {
            if (id === activeTabId) return;
            var entry = tabs[id];
            if (!entry) return;

            switchToWrapper(entry.wrapper, entry.tab);
            activeTabId = id;

            setTimeout(function () {
                void entry.wrapper.offsetHeight;
                entry.fitAddon.fit();
                entry.terminal.refresh(0, entry.terminal.rows - 1);
                entry.terminal.focus();
            }, 10);
        }

        function switchToWrapper(wrapper, tabEl) {
            var wrappers = containerEl.querySelectorAll('.terminal-wrapper');
            for (var i = 0; i < wrappers.length; i++) {
                wrappers[i].classList.remove('active');
            }
            var allTabs = tabsEl.querySelectorAll('.tab');
            for (var j = 0; j < allTabs.length; j++) {
                allTabs[j].classList.remove('active');
            }
            wrapper.classList.add('active');
            tabEl.classList.add('active');
        }

        // ---------------------
        // Add Tab Button
        // ---------------------
        addTabBtn.addEventListener('click', function () {
            createTab();
        });

        // ---------------------
        // ESC Key Passthrough
        // ---------------------
        // In matlab-proxy (browser-based MATLAB), the parent frame
        // intercepts ESC for its own UI (dismiss dialogs, menus).
        // This prevents ESC from reaching xterm.js, which breaks TUI
        // apps like Claude Code that rely on ESC for navigation.
        // Capture ESC early and stop it from propagating to the parent.
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && activeTabId && tabs[activeTabId] && !tabs[activeTabId].exited) {
                // If context menu is open, dismiss it instead of sending ESC to terminal.
                if (contextMenuEl) {
                    dismissContextMenu();
                    e.stopPropagation();
                    e.preventDefault();
                    return;
                }
                e.stopPropagation();
                e.preventDefault();
                bufferInput(activeTabId, '\x1b');
            }
        }, true);  // capture phase — runs before any other handler

        // ---------------------
        // Focus Recovery
        // ---------------------
        // In browser-based environments (matlab-proxy), xterm.js can lose
        // focus when TUI apps (like Claude's /mcp view) trigger rapid screen
        // updates through the nested iframe chain.  Re-focus the active
        // terminal on any click or when the document/window regains focus.
        function refocusActiveTerminal() {
            if (activeTabId && tabs[activeTabId] && !tabs[activeTabId].exited) {
                // In nested iframes (matlab-proxy), the iframe itself must
                // have focus before xterm's hidden textarea can receive keys.
                try { window.focus(); } catch (e) {}
                tabs[activeTabId].terminal.focus();
            }
        }
        document.addEventListener('click', refocusActiveTerminal);
        window.addEventListener('focus', refocusActiveTerminal);
        document.addEventListener('focusin', refocusActiveTerminal);

        // ---------------------
        // Context Menu (Copy/Paste)
        // ---------------------
        var contextMenuEl = null;

        function showContextMenu(x, y, id) {
            dismissContextMenu();
            var entry = tabs[id];
            if (!entry) return;

            var menu = document.createElement('div');
            menu.className = 'context-menu';

            var hasSelection = !!entry.terminal.getSelection();
            var canCopy = hasSelection && !!(navigator.clipboard && navigator.clipboard.writeText);

            var copyItem = document.createElement('div');
            copyItem.className = 'context-menu-item' + (canCopy ? '' : ' disabled');
            copyItem.innerHTML = '<span>Copy</span><span class="context-menu-shortcut">Ctrl+Shift+C</span>';
            if (canCopy) {
                copyItem.addEventListener('click', function () {
                    var sel = entry.terminal.getSelection();
                    if (sel) navigator.clipboard.writeText(sel);
                    dismissContextMenu();
                    entry.terminal.focus();
                });
            }

            var pasteItem = document.createElement('div');
            pasteItem.className = 'context-menu-item';
            pasteItem.innerHTML = '<span>Paste</span><span class="context-menu-shortcut">Ctrl+Shift+V</span>';
            pasteItem.addEventListener('click', function () {
                dismissContextMenu();
                // Route through MATLAB — CEF blocks clipboard.readText() from click events.
                sendToMATLAB({ type: 'paste', id: id });
                entry.terminal.focus();
            });

            menu.appendChild(copyItem);
            menu.appendChild(pasteItem);
            document.body.appendChild(menu);

            // Keep menu within viewport
            var rect = menu.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 4;
            if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 4;
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';

            contextMenuEl = menu;
        }

        function dismissContextMenu() {
            if (contextMenuEl) {
                contextMenuEl.remove();
                contextMenuEl = null;
            }
        }

        document.addEventListener('click', dismissContextMenu);

        // Use capture phase to intercept before native CEF/uihtml context menu.
        document.addEventListener('contextmenu', function (e) {
            if (!activeTabId || !tabs[activeTabId]) return;
            // Only trigger within the terminal area.
            if (!containerEl.contains(e.target)) return;
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            showContextMenu(e.clientX, e.clientY, activeTabId);
        }, true);

        // ---------------------
        // Resize Handling
        // ---------------------
        var resizeObserver = new ResizeObserver(function () {
            if (activeTabId && tabs[activeTabId]) {
                var entry = tabs[activeTabId];
                entry.fitAddon.fit();
                entry.terminal.refresh(0, entry.terminal.rows - 1);
            }
        });
        resizeObserver.observe(containerEl);

    })();
    </script>
</body>
</html>
