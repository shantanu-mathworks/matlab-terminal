<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <link rel="stylesheet" href="lib/xterm/xterm.css">
    <link rel="stylesheet" href="terminal.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div id="loading-title" class="loading-title">Starting Terminal...</div>
            <div id="loading-shortcuts" class="loading-shortcuts">
                <table>
                    <tr><td class="key">Ctrl+Shift+C</td><td>Copy selection</td></tr>
                    <tr><td class="key">Ctrl+Shift+V</td><td>Paste</td></tr>
                    <tr><td class="key">exit</td><td>Close terminal</td></tr>
                </table>
            </div>
        </div>
    </div>
    <div id="tab-bar">
        <div id="tabs"></div>
        <button id="add-tab-btn" title="New Terminal">+</button>
    </div>
    <div id="terminal-container"></div>
    <div id="debug" style="position:fixed;bottom:0;left:0;right:0;background:#300;color:#f88;font-family:monospace;font-size:11px;padding:4px 8px;z-index:9999;max-height:120px;overflow:auto;display:none;"></div>

    <script>
    // Polyfills for embedded CEF browsers (side panel) that may lack
    // these APIs. xterm.js requires both for its render service.
    if (!window.IntersectionObserver) {
        window.IntersectionObserver = function () {
            this.observe = function () {};
            this.unobserve = function () {};
            this.disconnect = function () {};
        };
    }
    (function () {
        var dummyMQL = {
            matches: false, media: '',
            addListener: function () {}, removeListener: function () {},
            addEventListener: function () {}, removeEventListener: function () {},
            dispatchEvent: function () { return false; }
        };
        if (!window.matchMedia) {
            window.matchMedia = function () { return dummyMQL; };
        } else {
            // Embedded CEF may have matchMedia but return null for some queries
            var origMatchMedia = window.matchMedia.bind(window);
            window.matchMedia = function (query) {
                return origMatchMedia(query) || dummyMQL;
            };
        }
    })();
    </script>
    <script src="lib/xterm/xterm.js"></script>
    <script src="lib/xterm/addon-fit.js"></script>
    <script>
    (function () {
        'use strict';

        var DEBUG = false;
        var debugEl = document.getElementById('debug');
        if (DEBUG) debugEl.style.display = 'block';
        function dbg(msg) {
            if (!DEBUG) return;
            debugEl.textContent += msg + '\n';
            debugEl.scrollTop = debugEl.scrollHeight;
        }

        // ---------------------
        // State
        // ---------------------
        var config = null;
        var tabs = {};
        var activeTabId = null;
        var tabCounter = 0;
        var pendingTabs = [];

        var tabsEl = document.getElementById('tabs');
        var addTabBtn = document.getElementById('add-tab-btn');
        var containerEl = document.getElementById('terminal-container');

        // ---------------------
        // Transport abstraction
        // ---------------------
        // Two transports:
        //   1. UIHTMLTransport — MATLAB's uihtml component (existing behavior)
        //   2. WebSocketTransport — direct connection to Go server (standalone browser)
        //
        // Both expose:
        //   send(msg)          — send a message to the server
        //   bufferInput(id, data) — send keystroke input (may buffer for efficiency)

        var transport = null;

        // ---------------------
        // UIHTMLTransport (MATLAB uihtml)
        // ---------------------
        function UIHTMLTransport(component) {
            this.htmlComp = component;
            this.useEvents = typeof component.sendEventToMATLAB === 'function';
            this.inputBuffer = {};
            this.inputFlushTimer = null;
            this.msgQueue = [];
            this.sendTimer = null;
        }

        UIHTMLTransport.prototype.send = function (msg) {
            if (this.useEvents) {
                this.htmlComp.sendEventToMATLAB(msg.type, msg);
                return;
            }
            this.msgQueue.push(msg);
            this._drainQueue();
        };

        UIHTMLTransport.prototype._drainQueue = function () {
            if (this.sendTimer || this.msgQueue.length === 0 || !this.htmlComp) return;
            var self = this;
            this.htmlComp.Data = this.msgQueue.shift();
            if (this.msgQueue.length > 0) {
                this.sendTimer = setTimeout(function () {
                    self.sendTimer = null;
                    self._drainQueue();
                }, 50);
            }
        };

        UIHTMLTransport.prototype.bufferInput = function (id, data) {
            if (this.useEvents) {
                this.send({ type: 'input', id: id, data: data });
                return;
            }
            if (!this.inputBuffer[id]) {
                this.inputBuffer[id] = '';
            }
            this.inputBuffer[id] += data;

            if (!this.inputFlushTimer) {
                var self = this;
                this.inputFlushTimer = setTimeout(function () {
                    self.inputFlushTimer = null;
                    var ids = Object.keys(self.inputBuffer);
                    for (var i = 0; i < ids.length; i++) {
                        var bid = ids[i];
                        if (self.inputBuffer[bid]) {
                            self.send({ type: 'input', id: bid, data: self.inputBuffer[bid] });
                            self.inputBuffer[bid] = '';
                        }
                    }
                }, 80);
            }
        };

        // ---------------------
        // MessageServiceTransport (side panel via connector's message bus)
        // ---------------------
        // Uses MATLAB's MessageService (Bayeux pub/sub) for communication.
        // JS publishes commands on /terminal/cmd, MATLAB relays to Go server.
        // MATLAB polls Go server output and publishes on /terminal/data.
        function MessageServiceTransport() {
            this.mw = null;
            this.ready = false;
            this.pendingMessages = [];
        }

        MessageServiceTransport.prototype.connect = function () {
            var self = this;
            dbg('MessageService: loading module');

            window.parent.require(["mw-messageservice/MessageService"], function (MessageService) {
                self.mw = MessageService.create({ serviceName: 'TerminalSidePanel' });
                MessageService.start();

                // Subscribe to data from MATLAB (output, created, sessions, etc.)
                self.mw.subscribe('/terminal/data', function (msg) {
                    self._onMessage(msg.data);
                });

                function onReady() {
                    dbg('MessageService: ready');
                    self.ready = true;

                    // Flush any messages queued before connection.
                    for (var i = 0; i < self.pendingMessages.length; i++) {
                        self.mw.publish('/terminal/cmd', self.pendingMessages[i]);
                    }
                    self.pendingMessages = [];

                    // Request existing sessions (reconnect scenario).
                    self.mw.publish('/terminal/cmd', { action: 'sessions' });
                }

                // MessageService may already be connected (parent started it).
                if (self.mw.isConnected()) {
                    onReady();
                } else {
                    var connHandle = self.mw.on('connected', function () {
                        connHandle.remove();
                        onReady();
                    });
                }
            });
        };

        MessageServiceTransport.prototype._awaitingSessions = true;
        MessageServiceTransport.prototype._pendingScrollbacks = 0;

        MessageServiceTransport.prototype._onMessage = function (data) {
            if (!data || typeof data !== 'object') return;
            dbg('MessageService recv: ' + data.type);

            switch (data.type) {
                case 'sessions':
                    this._awaitingSessions = false;
                    var ids = data.ids;
                    if (ids && ids.length > 0) {
                        this._pendingScrollbacks = ids.length;
                        for (var i = 0; i < ids.length; i++) {
                            this._publish({ action: 'scrollback', id: ids[i] });
                        }
                    } else {
                        createTab();
                        var overlay = document.getElementById('loading-overlay');
                        if (overlay) overlay.classList.add('hidden');
                    }
                    break;
                case 'scrollback':
                    reconnectTab(data.id, data.data);
                    this._pendingScrollbacks--;
                    if (this._pendingScrollbacks <= 0) {
                        var overlay = document.getElementById('loading-overlay');
                        if (overlay) overlay.classList.add('hidden');
                    }
                    break;
                case 'created':
                    finalizeTab(data.id);
                    break;
                case 'output':
                    writeOutput(data.id, data.data);
                    break;
                case 'exited':
                    markTabExited(data.id);
                    break;
                case 'theme':
                    var newTheme = data.theme;
                    config = { theme: newTheme };
                    applyTheme(newTheme);
                    var xtTheme = buildXtermTheme(newTheme);
                    var ids = Object.keys(tabs);
                    for (var t = 0; t < ids.length; t++) {
                        var entry = tabs[ids[t]];
                        if (entry.terminal) {
                            entry.terminal.options.theme = xtTheme;
                            entry.terminal.options.fontFamily = newTheme.fontFamily || 'Consolas, monospace';
                            entry.terminal.options.fontSize = newTheme.fontSize || 14;
                            if (entry.fitAddon) entry.fitAddon.fit();
                        }
                    }
                    break;
            }
        };

        MessageServiceTransport.prototype._publish = function (msg) {
            if (this.ready && this.mw) {
                this.mw.publish('/terminal/cmd', msg);
            } else {
                this.pendingMessages.push(msg);
            }
        };

        MessageServiceTransport.prototype.send = function (msg) {
            switch (msg.type) {
                case 'create':
                    this._publish({ action: 'create', cols: msg.cols || 80, rows: msg.rows || 24 });
                    break;
                case 'input':
                    this._publish({ action: 'input', id: msg.id, data: msg.data });
                    break;
                case 'resize':
                    if (msg.cols > 0 && msg.rows > 0) {
                        this._publish({ action: 'resize', id: msg.id, cols: msg.cols, rows: msg.rows });
                    }
                    break;
                case 'close':
                    this._publish({ action: 'close', id: msg.id });
                    break;
            }
        };

        MessageServiceTransport.prototype.bufferInput = function (id, data) {
            this._publish({ action: 'input', id: id, data: data });
        };

        // ---------------------
        // WebSocketTransport (standalone browser)
        // ---------------------
        function WebSocketTransport(port, token, useTLS) {
            this.port = port;
            this.token = token;
            this.useTLS = useTLS !== false; // default to true
            this.ws = null;
            this.reconnectDelay = 1000;
        }

        WebSocketTransport.prototype.connect = function () {
            var self = this;
            var host = window.location.hostname || '127.0.0.1';
            var scheme = this.useTLS ? 'wss://' : 'ws://';
            var url = scheme + host + ':' + this.port + '/api/ws?token=' + encodeURIComponent(this.token);
            dbg('WS connecting to ' + url);

            this.ws = new WebSocket(url);

            this.ws.onopen = function () {
                dbg('WS connected');
                self.reconnectDelay = 1000;
                // Ask server for existing sessions (reconnect scenario).
                self.ws.send(JSON.stringify({ type: 'sessions' }));
            };

            this.ws.onmessage = function (event) {
                var msg;
                try {
                    msg = JSON.parse(event.data);
                } catch (e) {
                    dbg('WS: invalid JSON: ' + e.message);
                    return;
                }
                self._onMessage(msg);
            };

            this.ws.onclose = function () {
                dbg('WS disconnected');
                self._showReconnecting();
                setTimeout(function () {
                    self.reconnectDelay = Math.min(self.reconnectDelay * 2, 10000);
                    self.connect();
                }, self.reconnectDelay);
            };

            this.ws.onerror = function () {
                dbg('WS error');
            };
        };

        WebSocketTransport.prototype._showReconnecting = function () {
            var overlay = document.getElementById('loading-overlay');
            if (overlay) {
                document.getElementById('loading-title').textContent = 'Reconnecting...';
                document.getElementById('loading-shortcuts').style.display = 'none';
                overlay.classList.remove('hidden');
            }
        };

        // Track sessions received during the "sessions" handshake.
        WebSocketTransport.prototype._pendingSessions = [];
        WebSocketTransport.prototype._awaitingSessions = false;

        WebSocketTransport.prototype._onMessage = function (msg) {
            dbg('WS recv: ' + msg.type + ' id=' + (msg.id || ''));

            switch (msg.type) {
                case 'session':
                    // Part of the sessions handshake — accumulate.
                    this._pendingSessions.push(msg);
                    break;
                case 'sessions_done':
                    // All existing sessions received. Initialize.
                    this._awaitingSessions = false;
                    if (this._pendingSessions.length > 0) {
                        for (var i = 0; i < this._pendingSessions.length; i++) {
                            var s = this._pendingSessions[i];
                            reconnectTab(s.id, s.data);
                        }
                    } else {
                        createTab();
                    }
                    this._pendingSessions = [];
                    // Hide loading overlay.
                    var overlay = document.getElementById('loading-overlay');
                    if (overlay) overlay.classList.add('hidden');
                    break;
                case 'created':
                    finalizeTab(msg.id);
                    break;
                case 'output':
                    writeOutput(msg.id, msg.data);
                    break;
                case 'exited':
                    markTabExited(msg.id);
                    break;
                case 'error':
                    dbg('Server error: ' + msg.data);
                    break;
            }
        };

        WebSocketTransport.prototype.send = function (msg) {
            if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                this.ws.send(JSON.stringify(msg));
            }
        };

        WebSocketTransport.prototype.bufferInput = function (id, data) {
            // WebSocket is full-duplex — no need to buffer.
            this.send({ type: 'input', id: id, data: data });
        };

        // ---------------------
        // Message dispatch (used by UIHTMLTransport)
        // ---------------------
        function handleMATLABMessage(data) {
            if (!data || typeof data !== 'object' || !data.type) return;

            dbg('From MATLAB: ' + data.type);

            switch (data.type) {
                case 'init':
                    initializeUIHTML(data.theme);
                    break;
                case 'created':
                    finalizeTab(data.id);
                    break;
                case 'output':
                    writeOutput(data.id, data.data);
                    break;
                case 'exited':
                    markTabExited(data.id, data.exitCode);
                    break;
                case 'theme':
                    dbg('THEME UPDATE received: isDark=' + (data.theme && data.theme.isDark));
                    var newTheme = data.theme;
                    config = { theme: newTheme };
                    applyTheme(newTheme);
                    var xtTheme = buildXtermTheme(newTheme);
                    var ids = Object.keys(tabs);
                    for (var t = 0; t < ids.length; t++) {
                        var entry = tabs[ids[t]];
                        if (entry.terminal) {
                            entry.terminal.options.theme = xtTheme;
                            entry.terminal.options.fontFamily = newTheme.fontFamily || 'Consolas, monospace';
                            entry.terminal.options.fontSize = newTheme.fontSize || 14;
                            if (entry.fitAddon) entry.fitAddon.fit();
                        }
                    }
                    break;
                case 'restarting':
                    var overlay = document.getElementById('loading-overlay');
                    if (overlay) {
                        document.getElementById('loading-title').textContent = 'Restarting Terminal...';
                        document.getElementById('loading-shortcuts').style.display = 'none';
                        overlay.classList.remove('hidden');
                    }
                    for (var rid in tabs) {
                        if (tabs[rid].terminal) tabs[rid].terminal.dispose();
                        if (tabs[rid].tab) tabs[rid].tab.remove();
                        if (tabs[rid].wrapper) tabs[rid].wrapper.remove();
                    }
                    tabs = {};
                    activeTabId = null;
                    pendingTabs = [];
                    initialized = false;
                    break;
                case 'batch':
                    var msgs = data.messages;
                    if (!msgs) {
                        dbg('batch: no messages field');
                        break;
                    }
                    if (!Array.isArray(msgs)) {
                        msgs = [msgs];
                    }
                    dbg('batch: ' + msgs.length + ' msgs');
                    for (var i = 0; i < msgs.length; i++) {
                        var m = msgs[i];
                        dbg('  msg[' + i + '] type=' + m.type + ' id=' + m.id + ' hasData=' + (!!m.data));
                        if (m.type === 'output') {
                            writeOutput(m.id, m.data);
                        } else if (m.type === 'exited') {
                            markTabExited(m.id, m.exitCode);
                        }
                    }
                    break;
            }
        }

        // ---------------------
        // MATLAB uihtml setup (called by framework)
        // ---------------------
        var initialized = false;

        function initializeUIHTML(theme) {
            if (initialized) return;
            initialized = true;
            config = { theme: theme };
            applyTheme(theme);

            var existingIds = theme.existingSessionIds;
            var scrollbacks = theme.scrollbacks || {};
            if (existingIds && existingIds.length > 0) {
                dbg('Reconnecting to ' + existingIds.length + ' existing session(s)');
                for (var i = 0; i < existingIds.length; i++) {
                    reconnectTab(existingIds[i], scrollbacks[existingIds[i]]);
                }
            } else {
                dbg('Initializing with new tab');
                createTab();
            }
        }

        // Named event handlers so we can remove them on re-entry.
        function onInit(event) { handleMATLABMessage({ type: 'init', theme: event.Data }); }
        function onCreated(event) { handleMATLABMessage(event.Data); }
        function onBatch(event) { handleMATLABMessage(event.Data); }
        function onTheme(event) { handleMATLABMessage(event.Data); }
        function onRestarting(event) { handleMATLABMessage({ type: 'restarting' }); }
        function onDataChanged(event) { handleMATLABMessage(event.Data); }

        window.setup = function (component) {
            dbg('setup() called by MATLAB');

            // Clean up previous state on reload (undock/redock).
            if (transport && transport instanceof UIHTMLTransport) {
                var prev = transport.htmlComp;
                if (prev) {
                    prev.removeEventListener('init', onInit);
                    prev.removeEventListener('created', onCreated);
                    prev.removeEventListener('batch', onBatch);
                    prev.removeEventListener('theme', onTheme);
                    prev.removeEventListener('restarting', onRestarting);
                    prev.removeEventListener('DataChanged', onDataChanged);
                }
            }

            // Dispose xterm.js instances and remove DOM elements.
            for (var id in tabs) {
                if (tabs[id].terminal) tabs[id].terminal.dispose();
                if (tabs[id].tab) tabs[id].tab.remove();
                if (tabs[id].wrapper) tabs[id].wrapper.remove();
            }
            tabs = {};
            activeTabId = null;

            transport = new UIHTMLTransport(component);
            initialized = false;

            dbg('useEvents=' + transport.useEvents);

            if (transport.useEvents) {
                component.addEventListener('init', onInit);
                component.addEventListener('created', onCreated);
                component.addEventListener('batch', onBatch);
                component.addEventListener('theme', onTheme);
                component.addEventListener('restarting', onRestarting);
            } else {
                component.addEventListener('DataChanged', onDataChanged);
            }

            // Tell MATLAB we're ready — triggers (re-)init.
            transport.send({ type: 'ready' });
        };

        // ---------------------
        // Standalone browser mode
        // ---------------------
        // Discovery order:
        //   1. URL query params: ?port=N&token=T (direct link)
        //   2. config.json in the same directory (side panel / file-based)
        //   3. None found — uihtml only (setup() will be called by MATLAB)
        //
        // In all cases, wait briefly for setup() since uihtml always wins.

        var defaultStandaloneTheme = {
            isDark: true,
            background: '#1e1e1e',
            foreground: '#d4d4d4',
            cursor: '#ffffff',
            fontFamily: 'Consolas, monospace',
            fontSize: 14
        };

        function connectStandalone(port, token, useTLS, theme) {
            dbg('Standalone mode: port=' + port + ' tls=' + useTLS);
            var t = theme || defaultStandaloneTheme;
            config = { theme: t };
            applyTheme(t);
            transport = new WebSocketTransport(port, token, useTLS);
            transport.connect();
        }

        (function detectStandaloneMode() {
            var params = new URLSearchParams(window.location.search);

            // --- Side panel mode (served through the Embedded Connector) ---
            // The connector adds ?mre=<base_url> to the page URL.
            // Uses MessageService (pub/sub) to communicate with MATLAB,
            // which relays to the Go PTY server on localhost.
            var mre = params.get('mre');
            if (mre) {
                // Give uihtml a brief chance to call setup(), then use MessageService.
                setTimeout(function () {
                    if (transport) return;
                    dbg('Side panel mode (mre param detected)');
                    config = { theme: defaultStandaloneTheme };
                    applyTheme(config.theme);
                    transport = new MessageServiceTransport();
                    transport.connect();
                }, 300);
                return;
            }

            // --- Direct WebSocket mode (URL params) ---
            var port = params.get('port');
            var token = params.get('token');
            var tls = params.get('tls');

            if (port && token) {
                var useTLS = tls !== '0' && tls !== 'false';
                // Parse theme from URL param if provided (JSON-encoded).
                var standaloneTheme = null;
                try {
                    var themeParam = params.get('theme');
                    if (themeParam) standaloneTheme = JSON.parse(themeParam);
                } catch (e) {}
                setTimeout(function () {
                    if (transport) return;
                    connectStandalone(port, token, useTLS, standaloneTheme);
                }, 200);
                return;
            }

            // --- config.json fallback (legacy) ---
            function tryConfigFile() {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', './config.json?_=' + Date.now(), true);
                xhr.timeout = 2000;
                xhr.onload = function () {
                    if (transport) return;
                    if (xhr.status === 200) {
                        try {
                            var cfg = JSON.parse(xhr.responseText);
                            if (cfg.port && cfg.token) {
                                var cfgTLS = cfg.tls !== false;
                                connectStandalone(cfg.port, cfg.token, cfgTLS);
                                return;
                            }
                        } catch (e) {
                            dbg('config.json parse error: ' + e.message);
                        }
                    }
                    scheduleRetry();
                };
                xhr.onerror = function () {
                    if (transport) return;
                    scheduleRetry();
                };
                xhr.ontimeout = function () {
                    if (transport) return;
                    scheduleRetry();
                };
                xhr.send();
            }

            var retryCount = 0;
            var maxRetries = 30;
            function scheduleRetry() {
                retryCount++;
                if (retryCount > maxRetries) {
                    dbg('config.json not found after ' + maxRetries + ' retries');
                    var title = document.getElementById('loading-title');
                    if (title) title.textContent = 'Run Terminal.startServerForSidePanel() in MATLAB';
                    return;
                }
                dbg('config.json retry ' + retryCount + '/' + maxRetries);
                setTimeout(tryConfigFile, 2000);
            }

            // Wait for uihtml, then try config.json if not in uihtml mode.
            setTimeout(function () {
                if (transport) return;
                tryConfigFile();
            }, 500);
        })();

        // ---------------------
        // Theme
        // ---------------------
        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function adjustBrightness(rgb, amount) {
            var r = Math.max(0, Math.min(255, rgb.r + amount));
            var g = Math.max(0, Math.min(255, rgb.g + amount));
            var b = Math.max(0, Math.min(255, rgb.b + amount));
            return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function applyTheme(theme) {
            if (!theme) return;
            var root = document.documentElement;
            if (!theme.isDark) {
                root.classList.add('light');
            } else {
                root.classList.remove('light');
            }
            if (theme.background) root.style.setProperty('--bg-color', theme.background);
            if (theme.foreground) root.style.setProperty('--fg-color', theme.foreground);
            if (theme.fontFamily) root.style.setProperty('--font-family', theme.fontFamily);
            if (theme.fontSize) root.style.setProperty('--font-size', theme.fontSize + 'px');

            if (theme.background) {
                var rgb = hexToRgb(theme.background);
                if (rgb) {
                    if (theme.isDark) {
                        root.style.setProperty('--tab-bg', adjustBrightness(rgb, 18));
                        root.style.setProperty('--tab-bg-active', theme.background);
                        root.style.setProperty('--tab-border', adjustBrightness(rgb, 30));
                        root.style.setProperty('--tab-fg', adjustBrightness(rgb, 120));
                        root.style.setProperty('--tab-fg-active', '#ffffff');
                        root.style.setProperty('--tab-hover-bg', adjustBrightness(rgb, 24));
                        root.style.setProperty('--scrollbar-thumb', adjustBrightness(rgb, 40));
                    } else {
                        root.style.setProperty('--tab-bg', adjustBrightness(rgb, -8));
                        root.style.setProperty('--tab-bg-active', theme.background);
                        root.style.setProperty('--tab-border', adjustBrightness(rgb, -18));
                        root.style.setProperty('--tab-fg', adjustBrightness(rgb, -100));
                        root.style.setProperty('--tab-fg-active', '#1e1e1e');
                        root.style.setProperty('--tab-hover-bg', adjustBrightness(rgb, -12));
                        root.style.setProperty('--scrollbar-thumb', adjustBrightness(rgb, -30));
                    }
                }
            }
        }

        function buildXtermTheme(theme) {
            if (!theme) return {};
            var xt = {
                background: theme.background || '#1e1e1e',
                foreground: theme.foreground || '#d4d4d4',
                cursor: theme.cursor || '#ffffff',
                cursorAccent: theme.cursorAccent || theme.background || '#1e1e1e',
                selectionBackground: theme.selectionBackground || '#264f78'
            };
            var ansiKeys = [
                'black', 'red', 'green', 'yellow', 'blue', 'magenta', 'cyan', 'white',
                'brightBlack', 'brightRed', 'brightGreen', 'brightYellow',
                'brightBlue', 'brightMagenta', 'brightCyan', 'brightWhite'
            ];
            for (var i = 0; i < ansiKeys.length; i++) {
                if (theme[ansiKeys[i]]) {
                    xt[ansiKeys[i]] = theme[ansiKeys[i]];
                }
            }
            return xt;
        }

        // ---------------------
        // Output handling
        // ---------------------
        function writeOutput(id, base64Data) {
            var entry = tabs[id];
            if (!entry) return;
            try {
                var raw = atob(base64Data);
            } catch (e) {
                dbg('Failed to decode base64 for ' + id + ': ' + e.message);
                return;
            }
            var bytes = new Uint8Array(raw.length);
            for (var i = 0; i < raw.length; i++) {
                bytes[i] = raw.charCodeAt(i);
            }
            entry.terminal.write(bytes);
        }

        function markTabExited(id, exitCode) {
            var entry = tabs[id];
            if (!entry) return;
            entry.exited = true;
            closeTab(id);
        }

        // ---------------------
        // Tab Management
        // ---------------------
        function createTab() {
            tabCounter++;
            var tempName = 'Terminal ' + tabCounter;

            var tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.innerHTML =
                '<span class="tab-label">' + tempName + '</span>' +
                '<button class="tab-close" title="Close">&times;</button>';

            var wrapper = document.createElement('div');
            wrapper.className = 'terminal-wrapper';
            containerEl.appendChild(wrapper);

            var theme = config && config.theme;
            var terminal = new Terminal({
                fontFamily: (theme && theme.fontFamily) || 'Consolas, monospace',
                fontSize: (theme && theme.fontSize) || 14,
                theme: buildXtermTheme(theme),
                cursorBlink: true,
                allowProposedApi: true
            });

            var fitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(fitAddon);
            terminal.open(wrapper);

            pendingTabs.push({
                terminal: terminal,
                fitAddon: fitAddon,
                wrapper: wrapper,
                tab: tabEl,
                exited: false
            });

            tabsEl.appendChild(tabEl);

            transport.send({ type: 'create' });

            switchToWrapper(wrapper, tabEl);

            setTimeout(function () {
                fitAddon.fit();
            }, 50);
        }

        function finalizeTab(id) {
            if (pendingTabs.length === 0) {
                dbg('Received "created" but no pending tab');
                return;
            }

            var entry = pendingTabs.shift();
            tabs[id] = entry;

            // Hide loading overlay once first tab is ready.
            var overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('hidden');
            entry.tab.dataset.tabId = id;
            activeTabId = id;

            entry.tab.addEventListener('click', function (e) {
                if (e.target.classList.contains('tab-close')) return;
                switchTab(id);
            });

            entry.tab.querySelector('.tab-close').addEventListener('click', function (e) {
                e.stopPropagation();
                closeTab(id);
            });

            entry.terminal.onData(function (data) {
                if (!entry.exited) {
                    transport.bufferInput(id, data);
                }
            });

            entry.terminal.onResize(function (size) {
                transport.send({ type: 'resize', id: id, cols: size.cols, rows: size.rows });
            });

            if (navigator.clipboard) {
                entry.terminal.attachCustomKeyEventHandler(function (e) {
                    if (e.ctrlKey && e.shiftKey && e.type === 'keydown') {
                        if (e.key === 'C') {
                            try {
                                var sel = entry.terminal.getSelection();
                                if (sel) navigator.clipboard.writeText(sel);
                            } catch (err) {}
                            return false;
                        }
                        if (e.key === 'V') {
                            try {
                                navigator.clipboard.readText().then(function (text) {
                                    if (text && !entry.exited) transport.bufferInput(id, text);
                                });
                            } catch (err) {}
                            return false;
                        }
                    }
                    return true;
                });
            }

            void entry.wrapper.offsetHeight;
            entry.fitAddon.fit();

            var dims = entry.fitAddon.proposeDimensions();
            if (dims) {
                transport.send({ type: 'resize', id: id, cols: dims.cols, rows: dims.rows });
            }

            entry.terminal.focus();

            function delayedFitAndResize() {
                entry.fitAddon.fit();
                entry.terminal.refresh(0, entry.terminal.rows - 1);
                var d = entry.fitAddon.proposeDimensions();
                if (d && d.cols > 0 && d.rows > 0) {
                    transport.send({ type: 'resize', id: id, cols: d.cols, rows: d.rows });
                }
            }
            setTimeout(function () {
                delayedFitAndResize();
                entry.terminal.focus();
            }, 100);
            setTimeout(delayedFitAndResize, 500);
            setTimeout(delayedFitAndResize, 1500);
        }

        function reconnectTab(id, scrollbackBase64) {
            tabCounter++;
            var tabName = 'Terminal ' + tabCounter;

            var tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.innerHTML =
                '<span class="tab-label">' + tabName + '</span>' +
                '<button class="tab-close" title="Close">&times;</button>';

            var wrapper = document.createElement('div');
            wrapper.className = 'terminal-wrapper';
            containerEl.appendChild(wrapper);

            var theme = config && config.theme;
            var terminal = new Terminal({
                fontFamily: (theme && theme.fontFamily) || 'Consolas, monospace',
                fontSize: (theme && theme.fontSize) || 14,
                theme: buildXtermTheme(theme),
                cursorBlink: true,
                allowProposedApi: true
            });

            var fitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(fitAddon);
            terminal.open(wrapper);

            if (scrollbackBase64) {
                dbg('Replaying scrollback for ' + id + ' (' + scrollbackBase64.length + ' base64 chars)');
                try {
                    var raw = atob(scrollbackBase64);
                    var bytes = new Uint8Array(raw.length);
                    for (var j = 0; j < raw.length; j++) {
                        bytes[j] = raw.charCodeAt(j);
                    }
                    terminal.write(bytes);
                } catch (e) {
                    dbg('Failed to decode scrollback for ' + id + ': ' + e.message);
                }
            }

            tabsEl.appendChild(tabEl);

            var entry = {
                terminal: terminal,
                fitAddon: fitAddon,
                wrapper: wrapper,
                tab: tabEl,
                exited: false
            };
            tabs[id] = entry;

            var overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('hidden');
            tabEl.dataset.tabId = id;
            activeTabId = id;

            tabEl.addEventListener('click', function (e) {
                if (e.target.classList.contains('tab-close')) return;
                switchTab(id);
            });

            tabEl.querySelector('.tab-close').addEventListener('click', function (e) {
                e.stopPropagation();
                closeTab(id);
            });

            terminal.onData(function (data) {
                if (!entry.exited) {
                    transport.bufferInput(id, data);
                }
            });

            terminal.onResize(function (size) {
                transport.send({ type: 'resize', id: id, cols: size.cols, rows: size.rows });
            });

            if (navigator.clipboard) {
                terminal.attachCustomKeyEventHandler(function (e) {
                    if (e.ctrlKey && e.shiftKey && e.type === 'keydown') {
                        if (e.key === 'C') {
                            try {
                                var sel = terminal.getSelection();
                                if (sel) navigator.clipboard.writeText(sel);
                            } catch (err) {}
                            return false;
                        }
                        if (e.key === 'V') {
                            try {
                                navigator.clipboard.readText().then(function (text) {
                                    if (text && !entry.exited) transport.bufferInput(id, text);
                                });
                            } catch (err) {}
                            return false;
                        }
                    }
                    return true;
                });
            }

            switchToWrapper(wrapper, tabEl);

            void wrapper.offsetHeight;
            fitAddon.fit();

            var dims = fitAddon.proposeDimensions();
            if (dims) {
                transport.send({ type: 'resize', id: id, cols: dims.cols, rows: dims.rows });
            }

            terminal.focus();

            setTimeout(function () {
                fitAddon.fit();
                terminal.refresh(0, terminal.rows - 1);
                terminal.focus();
                var d = fitAddon.proposeDimensions();
                if (d && d.cols > 0 && d.rows > 0) {
                    transport.send({ type: 'resize', id: id, cols: d.cols, rows: d.rows });
                }
            }, 100);
            setTimeout(function () {
                fitAddon.fit();
                terminal.refresh(0, terminal.rows - 1);
            }, 500);
        }

        function closeTab(id) {
            var entry = tabs[id];
            if (!entry) return;

            if (!entry.exited) {
                transport.send({ type: 'close', id: id });
            }

            entry.terminal.dispose();
            entry.tab.remove();
            entry.wrapper.remove();
            delete tabs[id];

            if (activeTabId === id) {
                var remaining = Object.keys(tabs);
                if (remaining.length > 0) {
                    switchTab(remaining[remaining.length - 1]);
                } else {
                    activeTabId = null;
                }
            }
        }

        function switchTab(id) {
            if (id === activeTabId) return;
            var entry = tabs[id];
            if (!entry) return;

            switchToWrapper(entry.wrapper, entry.tab);
            activeTabId = id;

            setTimeout(function () {
                void entry.wrapper.offsetHeight;
                entry.fitAddon.fit();
                entry.terminal.refresh(0, entry.terminal.rows - 1);
                entry.terminal.focus();
            }, 10);
        }

        function switchToWrapper(wrapper, tabEl) {
            var wrappers = containerEl.querySelectorAll('.terminal-wrapper');
            for (var i = 0; i < wrappers.length; i++) {
                wrappers[i].classList.remove('active');
            }
            var allTabs = tabsEl.querySelectorAll('.tab');
            for (var j = 0; j < allTabs.length; j++) {
                allTabs[j].classList.remove('active');
            }
            wrapper.classList.add('active');
            tabEl.classList.add('active');
        }

        // ---------------------
        // Add Tab Button
        // ---------------------
        addTabBtn.addEventListener('click', function () {
            createTab();
        });

        // ---------------------
        // ESC Key Passthrough
        // ---------------------
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && activeTabId && tabs[activeTabId] && !tabs[activeTabId].exited) {
                if (contextMenuEl) {
                    dismissContextMenu();
                    e.stopPropagation();
                    e.preventDefault();
                    return;
                }
                e.stopPropagation();
                e.preventDefault();
                if (transport) transport.bufferInput(activeTabId, '\x1b');
            }
        }, true);

        // ---------------------
        // Focus Recovery
        // ---------------------
        function refocusActiveTerminal() {
            if (activeTabId && tabs[activeTabId] && !tabs[activeTabId].exited) {
                try { window.focus(); } catch (e) {}
                tabs[activeTabId].terminal.focus();
            }
        }
        document.addEventListener('click', refocusActiveTerminal);
        window.addEventListener('focus', refocusActiveTerminal);
        document.addEventListener('focusin', refocusActiveTerminal);

        // ---------------------
        // Context Menu (uihtml mode only — DDG has its own)
        // ---------------------
        var contextMenuEl = null;

        function showContextMenu(x, y, id) {
            dismissContextMenu();
            var entry = tabs[id];
            if (!entry) return;

            var menu = document.createElement('div');
            menu.className = 'context-menu';

            var hasSelection = !!entry.terminal.getSelection();
            var canCopy = hasSelection && !!(navigator.clipboard && navigator.clipboard.writeText);

            var copyItem = document.createElement('div');
            copyItem.className = 'context-menu-item' + (canCopy ? '' : ' disabled');
            copyItem.innerHTML = '<span>Copy</span><span class="context-menu-shortcut">Ctrl+Shift+C</span>';
            if (canCopy) {
                copyItem.addEventListener('click', function () {
                    var sel = entry.terminal.getSelection();
                    if (sel) navigator.clipboard.writeText(sel);
                    dismissContextMenu();
                    entry.terminal.focus();
                });
            }

            var pasteItem = document.createElement('div');
            pasteItem.className = 'context-menu-item';
            pasteItem.innerHTML = '<span>Paste</span><span class="context-menu-shortcut">Ctrl+Shift+V</span>';
            pasteItem.addEventListener('click', function () {
                dismissContextMenu();
                if (transport) transport.send({ type: 'paste', id: id });
                entry.terminal.focus();
            });

            menu.appendChild(copyItem);
            menu.appendChild(pasteItem);
            document.body.appendChild(menu);

            var rect = menu.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 4;
            if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 4;
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';

            contextMenuEl = menu;
        }

        function dismissContextMenu() {
            if (contextMenuEl) {
                contextMenuEl.remove();
                contextMenuEl = null;
            }
        }

        document.addEventListener('click', dismissContextMenu);

        // Only show custom context menu in uihtml mode (UIHTMLTransport).
        // In DDG/WebSocket mode, the framework provides its own context menu.
        document.addEventListener('contextmenu', function (e) {
            if (!transport || !(transport instanceof UIHTMLTransport)) return;
            if (!activeTabId || !tabs[activeTabId]) return;
            if (!containerEl.contains(e.target)) return;
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            showContextMenu(e.clientX, e.clientY, activeTabId);
        }, true);

        // ---------------------
        // Resize Handling
        // ---------------------
        var resizeObserver = new ResizeObserver(function () {
            if (activeTabId && tabs[activeTabId]) {
                var entry = tabs[activeTabId];
                entry.fitAddon.fit();
                entry.terminal.refresh(0, entry.terminal.rows - 1);
            }
        });
        resizeObserver.observe(containerEl);

    })();
    </script>
</body>
