name: Enhancement Request
description: Suggest an enhancement for this project.
title: "<Enter short description>"
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        This section is to report an enhancement request. To report a bug instead, return to [Create an Issue](https://github.com/prabhakk-mw/matlab-terminal/issues/new/choose).

  - type: textarea
    id: enhancement-summary
    attributes:
      label: A brief description of the enhancement you are proposing
      description: A clear and concise description of what the enhancement is.

  - type: textarea
    id: use-case
    attributes:
      label: What use case or challenge would this help you overcome?
      description: For example, "currently, it is too time-consuming/difficult to do xyz."

  - type: textarea
    id: suggestions
    attributes:
      label: Suggestions for implementing the request
      description: Provide a prototype, sketch, reference etc, if possible.

  - type: textarea
    id: additional-info
    attributes:
      label: Any additional information
      description: Details, stack traces, related issues, links for context, etc.
